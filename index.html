<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryGate V1 - Movement-Led Retrieval Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <h1>MemoryGate V1</h1>
        <p>
          Movement-led memory retrieval prototype (mouse movement stands in for eye
          tracking)
        </p>
      </header>

      <main class="layout">
        <section class="memory-field-panel">
          <div class="panel-label-row">
            <h2>Memory Field</h2>
            <span class="panel-note">Move first. Type later.</span>
          </div>
          <div id="memoryField" class="memory-field" aria-label="Memory field"></div>
        </section>

        <aside class="detail-panel">
          <h2>Detail Panel</h2>
          <div id="detailContent" class="detail-content">
            <p class="muted">Click a memory item to inspect details and add a note.</p>
          </div>
        </aside>
      </main>

      <footer class="status-strip" id="statusStrip" aria-live="polite">
        <span>selected: none</span>
        <span>tracked items: 0</span>
        <span>avg speed: 0.00 px/ms</span>
        <span>slow-zone events: 0</span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
