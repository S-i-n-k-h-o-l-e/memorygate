<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryGate</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <h1>MemoryGate</h1>
        <nav class="top-nav" aria-label="Primary">
          <button type="button" data-route="home" class="nav-btn">Home</button>
          <button type="button" data-route="recover" class="nav-btn">Recover</button>
          <button type="button" data-route="memory-net" class="nav-btn">Memory Net</button>
        </nav>
      </header>

      <main>
        <section id="homePage" class="page">
          <div class="home-grid">
            <button type="button" class="home-option" data-route="recover">Recover a memory</button>
            <button type="button" class="home-option" data-route="memory-net">Memory Net</button>
          </div>
        </section>

        <section id="recoverPage" class="page hidden">
          <div class="recover-controls panel">
            <div id="typeSelector" class="type-selector" role="group" aria-label="Recovery type">
              <button type="button" data-type="object">object</button>
              <button type="button" data-type="song">song</button>
              <button type="button" data-type="location">location</button>
              <button type="button" data-type="name">name</button>
              <button type="button" data-type="phrase">phrase</button>
              <button type="button" data-type="thought">thought</button>
              <button type="button" data-type="other">other</button>
            </div>
            <label class="visually-hidden" for="cueInput">Optional cue</label>
            <input id="cueInput" type="text" placeholder="Optional cue" />
          </div>

          <div class="recover-layout">
            <section class="panel">
              <textarea id="retrievalField" class="retrieval-field" placeholder="What are you trying to recover right now?"></textarea>
              <div id="recoverZone" class="recover-zone" aria-label="Movement retrieval zone">
                <svg id="recoverLinks" class="link-layer" aria-hidden="true"></svg>
              </div>
            </section>

            <aside class="panel right-col">
              <section>
                <h2>Candidates</h2>
                <div id="candidateList" class="candidate-list"></div>
              </section>

              <section id="recoverDetail" class="detail-panel">
                <p class="muted">Select a candidate.</p>
              </section>

              <section>
                <h2>Recall cascade</h2>
                <div id="cascadeList" class="candidate-list"></div>
              </section>

              <details>
                <summary>Why this surfaced</summary>
                <div id="recoverTelemetry" class="telemetry"></div>
              </details>

              <div class="outcome-row">
                <button type="button" class="outcome-btn" data-outcome="No">No</button>
                <button type="button" class="outcome-btn" data-outcome="Partly">Partly</button>
                <button type="button" class="outcome-btn" data-outcome="Yes">Yes</button>
              </div>
            </aside>
          </div>
        </section>

        <section id="memoryNetPage" class="page hidden">
          <div class="net-layout">
            <section class="panel">
              <h2>Add memory</h2>
              <form id="memoryForm" class="memory-form">
                <input id="memoryTitle" required type="text" placeholder="Title" />
                <textarea id="memoryFragment" required placeholder="Fragment"></textarea>
                <select id="memoryType" required>
                  <option value="">Type</option>
                  <option value="object">object</option>
                  <option value="song">song</option>
                  <option value="location">location</option>
                  <option value="name">name</option>
                  <option value="phrase">phrase</option>
                  <option value="thought">thought</option>
                  <option value="other">other</option>
                </select>
                <input id="memoryTags" type="text" placeholder="tags (comma separated)" />
                <input id="memoryThread" type="text" placeholder="thread" />
                <input id="anchorObject" type="text" placeholder="anchor object(s)" />
                <input id="anchorSong" type="text" placeholder="anchor song(s)" />
                <input id="anchorLocation" type="text" placeholder="anchor location(s)" />
                <input id="anchorPerson" type="text" placeholder="anchor person(s)" />
                <input id="anchorPhrase" type="text" placeholder="anchor phrase(s)" />
                <textarea id="memoryNotes" placeholder="notes"></textarea>
                <button type="submit">Save</button>
              </form>
            </section>

            <section class="panel">
              <h2>Memory field</h2>
              <div id="netField" class="net-field"></div>
            </section>

            <section class="panel">
              <h2>Stored memories</h2>
              <div id="memoryList" class="memory-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
