<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryGate</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <h1>MemoryGate</h1>
        <div class="top-bar-right">
          <nav class="top-nav" aria-label="Primary">
            <button type="button" data-route="memory-net" class="nav-btn">Memory Net</button>
            <button type="button" data-route="recover" class="nav-btn">Recover</button>
            <button type="button" data-route="timeline" class="nav-btn">Timeline</button>
            <button type="button" data-route="settings" class="nav-btn">Settings</button>
          </nav>
          <div id="userMenu" class="user-menu hidden" aria-live="polite">
            <span id="currentUserLabel" class="user-label"></span>
            <button id="signOutBtn" type="button">Sign out</button>
          </div>
        </div>
      </header>

      <main>
        <section id="authPage" class="page hidden">
          <div class="auth-layout">
            <section class="panel">
              <h2>Sign in</h2>
              <form id="signInForm" class="stack-form">
                <select id="signInProfileSelect" required>
                  <option value="">Select profile</option>
                </select>
                <button type="submit">Sign in</button>
              </form>
            </section>

            <section class="panel">
              <h2>Create profile</h2>
              <form id="createProfileForm" class="stack-form">
                <input id="createProfileName" required type="text" maxlength="40" placeholder="Profile name" />
                <button type="submit">Create profile</button>
              </form>
              <p id="authFeedback" class="muted"></p>
            </section>
          </div>
        </section>

        <section id="recoverPage" class="page hidden">
          <div class="recover-minimal panel">
            <input id="recoverInput" type="text" placeholder="Enter one word and press Enter" autocomplete="off" />
            <div id="recoverTrail" class="recover-trail" aria-live="polite"></div>
            <div id="recoverZone" class="recover-zone" aria-label="Word association cloud"></div>
            <div id="recoverPreview" class="recover-preview"></div>
          </div>
        </section>

        <section id="memoryNetPage" class="page">
          <div class="net-topbar panel">
            <div>
              <h2>Memory Net</h2>
              <p class="muted">Browse and build your spatial memory graph.</p>
            </div>
            <button type="button" id="openComposerBtn" class="primary">Add memory</button>
          </div>

          <div class="net-layout">
            <section class="panel">
              <div id="netField" class="graph-field graph-field-large">
                <svg id="netLinks" class="link-layer" aria-hidden="true"></svg>
              </div>
            </section>

            <aside id="nodeDetailPanel" class="panel detail-aside hidden">
              <h3>Memory detail</h3>
              <form id="editorForm" class="stack-form">
                <input name="title" type="text" placeholder="Title" required />
                <textarea name="fragment" placeholder="Fragment"></textarea>
                <input name="date" type="date" required />
                <input name="tags" type="text" placeholder="tags" />
                <div id="linkedNodeSummary" class="muted"></div>
                <select name="linkTargetId">
                  <option value="">Link to node...</option>
                </select>
                <button type="button" id="quickLinkBtn">Add link</button>
                <button type="submit">Save changes</button>
                <button type="button" id="deleteNodeBtn" class="danger">Delete node</button>
              </form>
            </aside>
          </div>

          <dialog id="memoryComposer" class="composer-dialog">
            <form id="memoryForm" class="stack-form" method="dialog">
              <h3>Add memory</h3>
              <input name="title" required type="text" placeholder="Title" />
              <textarea name="fragment" required placeholder="Fragment"></textarea>
              <select name="memoryType" required>
                <option value="">Type</option>
              </select>
              <input name="date" required type="date" />
              <input name="tags" type="text" placeholder="tags (comma separated)" />
              <select name="linkToId">
                <option value="">Optional link</option>
              </select>
              <div class="row-actions">
                <button type="submit" class="primary">Save memory</button>
                <button type="button" id="cancelComposerBtn">Cancel</button>
              </div>
            </form>
          </dialog>
        </section>

        <section id="timelinePage" class="page hidden">
          <div class="timeline-layout">
            <section class="panel">
              <h2>Events</h2>
              <div id="eventTimeline" class="timeline-list"></div>
            </section>
            <section class="panel">
              <h2>Date clusters</h2>
              <div id="dateClusters" class="timeline-list"></div>
            </section>
            <section class="panel">
              <h2>Linked memories</h2>
              <div id="timelineDetail" class="detail-panel"><p class="muted">Select an event or date.</p></div>
            </section>
          </div>
        </section>

        <section id="settingsPage" class="page hidden">
          <section class="panel settings-panel">
            <h2>Settings</h2>
            <label>
              Pointer slow threshold
              <input id="slowThresholdInput" type="number" step="0.01" min="0.01" max="2" />
            </label>
            <label>
              Recover node limit
              <input id="nodeLimitInput" type="number" min="4" max="24" />
            </label>
            <button type="button" id="saveSettingsBtn">Save settings</button>
          </section>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
