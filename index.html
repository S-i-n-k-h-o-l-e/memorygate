<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryGate V2 - Retrieval Experiment Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <h1>MemoryGate V2</h1>
        <p>Movement-led retrieval experiment (mouse movement as eye-tracking proxy)</p>
      </header>

      <section class="control-strip" aria-label="retrieval controls">
        <div class="control-group">
          <label for="modeSelect">Retrieval mode</label>
          <select id="modeSelect">
            <option value="freeDrift">Free drift</option>
            <option value="focusedRecall">Focused recall</option>
            <option value="weakMemory">Weak memory mode</option>
          </select>
        </div>

        <div class="control-group">
          <label for="fieldSortSelect">Field organization</label>
          <select id="fieldSortSelect">
            <option value="relevance">By inferred relevance</option>
            <option value="thread">By thread</option>
            <option value="emotional_state">By emotional state</option>
            <option value="time">By time</option>
          </select>
        </div>

        <div class="button-group">
          <button id="lockBtn" type="button">Lock selection</button>
          <button id="revealBtn" type="button">Reveal related</button>
          <button id="sessionBtn" type="button">Start recall session</button>
        </div>
      </section>

      <main class="layout">
        <section class="memory-field-panel">
          <div class="panel-label-row">
            <h2>Memory Field</h2>
            <span class="panel-note">Move first. Type only after selection.</span>
          </div>
          <div id="memoryField" class="memory-field" aria-label="Memory field"></div>
        </section>

        <aside class="detail-panel">
          <h2>Detail Panel</h2>
          <section id="liveSignalBlock" class="live-signal-block" aria-live="polite"></section>
          <div id="detailContent" class="detail-content">
            <p class="muted">Click a memory item to inspect details and add a note.</p>
          </div>
        </aside>
      </main>

      <footer class="status-strip" id="statusStrip" aria-live="polite"></footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
