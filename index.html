<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemoryGate</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <h1>MemoryGate</h1>
        <nav class="top-nav" aria-label="Primary">
          <button type="button" data-route="home" class="nav-btn">Home</button>
          <button type="button" data-route="recover" class="nav-btn">Recover</button>
          <button type="button" data-route="memory-net" class="nav-btn">Memory Net</button>
          <button type="button" data-route="timeline" class="nav-btn">Timeline</button>
        </nav>
      </header>

      <main>
        <section id="homePage" class="page">
          <div class="home-grid">
            <button type="button" class="home-option" data-route="recover">Recover</button>
            <button type="button" class="home-option" data-route="memory-net">Memory Net</button>
            <button type="button" class="home-option" data-route="timeline">Timeline</button>
            <button type="button" class="home-option" data-route="settings">Settings</button>
          </div>
        </section>

        <section id="recoverPage" class="page hidden">
          <div class="recover-controls panel">
            <div id="typeSelector" class="type-selector" role="group" aria-label="Cue type selector"></div>
            <input id="cueInput" type="text" placeholder="Cue" />
            <select id="recencyFilter">
              <option value="all">Any time</option>
              <option value="7">Last 7 days</option>
              <option value="30">Last 30 days</option>
              <option value="90">Last 90 days</option>
            </select>
          </div>

          <div class="recover-layout">
            <section class="panel">
              <div id="recoverZone" class="graph-field" aria-label="Movement-led candidate field">
                <svg id="recoverLinks" class="link-layer" aria-hidden="true"></svg>
              </div>
              <div id="candidateStrip" class="candidate-strip"></div>
            </section>

            <aside class="panel right-col">
              <section id="recoverDetail" class="detail-panel">
                <p class="muted">Select a node.</p>
              </section>
              <section>
                <h3>Recall cascade</h3>
                <div id="cascadeList" class="candidate-list"></div>
              </section>
              <section>
                <h3>Session outcome</h3>
                <div class="outcome-row">
                  <button type="button" class="outcome-btn" data-outcome="No">No</button>
                  <button type="button" class="outcome-btn" data-outcome="Partly">Partly</button>
                  <button type="button" class="outcome-btn" data-outcome="Yes">Yes</button>
                </div>
              </section>
              <details>
                <summary>Advanced telemetry</summary>
                <div id="recoverTelemetry" class="telemetry"></div>
              </details>
            </aside>
          </div>
        </section>

        <section id="memoryNetPage" class="page hidden">
          <div class="net-layout">
            <section class="panel forms-col">
              <h2>Add memory</h2>
              <form id="memoryForm" class="stack-form">
                <input name="title" required type="text" placeholder="Title" />
                <textarea name="fragment" required placeholder="Fragment"></textarea>
                <select name="memoryType" required>
                  <option value="">memory type</option>
                </select>
                <input name="tags" type="text" placeholder="tags (comma separated)" />
                <input name="thread" type="text" placeholder="thread" />
                <textarea name="notes" placeholder="notes"></textarea>
                <button type="submit">Save memory</button>
              </form>

              <h2>Add anchor</h2>
              <form id="anchorForm" class="stack-form">
                <select name="nodeType" required>
                  <option value="">anchor type</option>
                </select>
                <input name="label" required type="text" placeholder="Label" />
                <input name="tags" type="text" placeholder="tags" />
                <button type="submit">Save anchor</button>
              </form>

              <h2>Add event</h2>
              <form id="eventForm" class="stack-form">
                <input name="title" required type="text" placeholder="Event title" />
                <input name="startTime" required type="datetime-local" />
                <input name="endTime" type="datetime-local" />
                <input name="location" type="text" placeholder="Location" />
                <input name="people" type="text" placeholder="People (comma separated)" />
                <textarea name="notes" placeholder="Notes"></textarea>
                <button type="submit">Save event</button>
              </form>
            </section>

            <section class="panel">
              <h2>Memory Net</h2>
              <div id="netField" class="graph-field">
                <svg id="netLinks" class="link-layer" aria-hidden="true"></svg>
              </div>
            </section>

            <section class="panel editor-col">
              <h2>Node list</h2>
              <div id="nodeList" class="node-list"></div>

              <h2>Selected editor</h2>
              <form id="editorForm" class="stack-form hidden">
                <input name="title" type="text" placeholder="Title / Label" />
                <textarea name="fragment" placeholder="Fragment / Notes"></textarea>
                <input name="tags" type="text" placeholder="tags" />
                <input name="thread" type="text" placeholder="thread" />
                <textarea name="notes" placeholder="notes"></textarea>
                <button type="submit">Update node</button>
                <button type="button" id="deleteNodeBtn" class="danger">Delete node</button>
              </form>

              <h2>Link nodes</h2>
              <form id="linkForm" class="stack-form">
                <select name="sourceId" required></select>
                <select name="targetId" required></select>
                <button type="submit">Create link</button>
              </form>
            </section>
          </div>
        </section>

        <section id="timelinePage" class="page hidden">
          <div class="timeline-layout">
            <section class="panel">
              <h2>Events</h2>
              <div id="eventTimeline" class="timeline-list"></div>
            </section>
            <section class="panel">
              <h2>Date clusters</h2>
              <div id="dateClusters" class="timeline-list"></div>
            </section>
            <section class="panel">
              <h2>Linked memories</h2>
              <div id="timelineDetail" class="detail-panel"><p class="muted">Select an event or date.</p></div>
            </section>
          </div>
        </section>

        <section id="settingsPage" class="page hidden">
          <section class="panel settings-panel">
            <h2>Settings</h2>
            <label>
              Pointer slow threshold
              <input id="slowThresholdInput" type="number" step="0.01" min="0.01" max="2" />
            </label>
            <label>
              Recover node limit
              <input id="nodeLimitInput" type="number" min="4" max="24" />
            </label>
            <button type="button" id="saveSettingsBtn">Save settings</button>
          </section>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
